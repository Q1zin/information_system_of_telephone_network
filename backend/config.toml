# Application configuration (req. 5: DB connection data in a config file).
# Any value can be overridden via environment variables with the GTS__ prefix
# and `__` as the separator, e.g.  GTS__DATABASE__PASSWORD=secret

[database]
host = "localhost"
port = 5433
user = "gts"
password = "gts"
name = "gts"
max_connections = 10

[server]
host = "0.0.0.0"
port = 8080

[auth]
# Change in production; used to sign session cookies.
session_secret = "dev-only-session-secret-change-me-please-0123456789abcdef"
# Bootstrap superadmin created on first run if it does not exist.
superadmin_username = "admin"
superadmin_password = "admin"
